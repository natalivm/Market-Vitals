name: Market Vitals Auto-Update

on:
  # ── SCHEDULE DISABLED ──────────────────────────────────────────────────
  # update_vitals.py patches the OLD HTML structure. After index.html was
  # refactored to the single SCAN config block + JS-filled chrome, the
  # script's regexes no longer match (composite, header, ribbon, footer),
  # so a run would produce a half-updated, inconsistent board. Re-enable
  # only after the script is rewired to target SCAN. Until then we update
  # the dashboard manually from the Market Vitals Bot feed.
  #
  # schedule:
  #   # All times UTC | Kyiv (EEST = UTC+3)
  #   - cron: '0 13 * * 1-5'   # 13:00 UTC = 4:00 PM Kyiv  (pre-market scan)
  #   - cron: '30 15 * * 1-5'  # 15:30 UTC = 6:30 PM Kyiv  (mid-session)
  #   - cron: '30 19 * * 1-5'  # 19:30 UTC = 10:30 PM Kyiv (30 min before US close)
  workflow_dispatch:          # manual trigger only (use with caution — see note above)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT so the push back to the repo is accepted
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure git identity
        run: |
          git config user.name  "market-vitals-bot"
          git config user.email "bot@market-vitals.local"

      - name: Run update script
        env:
          # Set HINDENBURG_TRIGGERED=true in GitHub repo variables
          # (Settings → Secrets and variables → Variables) to manually
          # flag the Hindenburg Omen.  Leave unset or false to auto-detect
          # from McClellan (triggered when McClellan < -5).
          HINDENBURG_TRIGGERED: ${{ vars.HINDENBURG_TRIGGERED }}
        run: python scripts/update_vitals.py
