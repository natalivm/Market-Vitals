name: Rotation Radar Auto-Fetch

# Self-sourced Rotation Radar bot. Pulls ETF prices (Yahoo), derives net flows
# from shares-outstanding deltas, and appends a schema-valid snapshot to
# data/rotation_history.json. These are OUR computed numbers (see
# docs/rotation_feed_spec.md). The script ABORTS without writing if coverage is
# low or the snapshot fails schema validation, so a bad day never gets committed.

on:
  workflow_dispatch:        # manual trigger
  schedule:
    # 20:10 UTC = 11:10 PM Kyiv, ~10 min after the US cash close (the daily record)
    - cron: '10 20 * * 1-5'

permissions:
  contents: write

concurrency:
  group: rotation-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git identity
        run: |
          git config user.name  "rotation-radar-bot"
          git config user.email "bot@market-vitals.local"

      - name: Fetch & append snapshot (stdlib only — no deps)
        # --force lets the authoritative CLOSE snapshot replace any same-day
        # intraday/re-run entry. The script still refuses to overwrite a PRIOR
        # day (its market-closed guard), so weekends/holidays write nothing.
        run: python3 scripts/fetch_rotation.py --append data/rotation_history.json --force

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/rotation_history.json data/rotation_shares.json; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          git add data/rotation_history.json data/rotation_shares.json
          git commit -m "Rotation: auto-fetch $(date -u +%Y-%m-%d) close snapshot (self-sourced)"
          git push
